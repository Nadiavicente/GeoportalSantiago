<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geoportal Santiago de Compostela</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="geoportal.css">
</head>
</head>
<body>

<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-txt">Cargando capas</div>
  <div id="loader-sub">Iniciando…</div>
</div>

<header>
  <!-- Home + Conexiones buttons — left -->
  <div style="display:flex;align-items:center;gap:8px;">
    <a class="home-btn" href="index.html" title="Volver al inicio">
      <span class="home-btn-ico">⌂</span>Inicio
    </a>
    <a class="home-btn" href="dashboard_conexiones_santiago.html" title="Ver conexiones">
      <span class="home-btn-ico">🔗</span>Conexiones
    </a>
  </div>
  <!-- Logo — centered absolutely -->
  <div class="logo" style="position:absolute;left:50%;transform:translateX(-50%);">
    <svg width="38" height="38" viewBox="0 0 42 42" fill="none">
      <circle cx="21" cy="21" r="21" fill="#1d4ed8"/>
      <rect x="7"  y="18" width="5" height="16" rx="1" fill="white" opacity=".9"/>
      <rect x="30" y="18" width="5" height="16" rx="1" fill="white" opacity=".9"/>
      <rect x="13" y="22" width="16" height="12" rx="1" fill="white"/>
      <circle cx="21" cy="27" r="3" fill="#1d4ed8" opacity=".65"/>
      <polygon points="7,18 9.5,10 12,18"  fill="white" opacity=".9"/>
      <polygon points="30,18 32.5,10 35,18" fill="white" opacity=".9"/>
      <polygon points="16,22 21,12 26,22"  fill="white"/>
      <rect x="20" y="9" width="2" height="5" rx=".5" fill="#1d4ed8"/>
      <rect x="18.5" y="11" width="5" height="1.5" rx=".5" fill="#1d4ed8"/>
      <path d="M18 34 Q21 30 24 34" stroke="#1d4ed8" stroke-width="1.2" fill="none"/>
    </svg>
    <div>
      <div class="lname">Geoportal Santiago de Compostela</div>
      <div class="lsub">Capas Espaciales · SRC 4326</div>
    </div>
  </div>
  <!-- Status — right -->
  <div class="hstatus">
    <div class="dot loading" id="dot"></div>
    <span id="stxt">Iniciando…</span>
  </div>
</header>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="search-box">
      <span class="search-lbl">🔍 Buscar barrio</span>
      <div class="search-wrap">
        <input id="srch" class="search-input" type="text" placeholder="Escribe el nombre…" autocomplete="off"/>
        <span class="s-ico" id="s-ico">⌕</span>
        <button class="s-clr" id="s-clr" onclick="clearSearch()">✕</button>
        <div class="search-drop" id="srch-drop"></div>
      </div>
    </div>
    <div class="search-box" style="padding-bottom:10px;">
      <span class="search-lbl" style="color:var(--amber);">🏛 Buscar monumento</span>
      <div class="mon-input-wrap" style="padding:0;position:relative;">
        <input id="mon-srch" class="mon-input" type="text" placeholder="Nombre, tipo o categoría…" autocomplete="off"/>
        <span class="mon-input-ico">⌕</span>
      </div>
    </div>
    <button class="report-fab" id="report-fab">
      <span class="report-fab-icon">📋</span>
      Enviar reporte ciudadano
    </button>
    <div class="sbhead">
      <span class="sbtitle">Capas</span>
      <button class="btnall" id="btnall" onclick="toggleAll()">Ocultar todas</button>
    </div>
    <div class="lylist" id="lylist"></div>
  </div>

  <div class="mapwrap">
    <div id="map"></div>
    <button class="sbbtn" onclick="toggleSb()">☰</button>
    <div class="map-hint" id="map-hint">📍 Clic en el mapa → ver servicios cercanos</div>

    <div class="stats-panel" id="sp">
      <div class="sp-head">
        <div style="min-width:0;flex:1">
          <div class="sp-title" id="sp-title">—</div>
          <div class="sp-sub"  id="sp-sub">—</div>
          <span class="sp-badge" id="sp-badge"></span>
        </div>
        <button class="sp-close" onclick="closeStats()">✕</button>
      </div>
      <div class="sp-body" id="sp-body"></div>
    </div>

    <!-- MONUMENT PANEL -->
    <div class="mon-panel" id="mon-panel">
      <div class="mon-head">
        <div class="mon-head-title">
          <svg width="16" height="16" viewBox="0 0 22 22"><circle cx="11" cy="11" r="10" fill="none" stroke="white" stroke-width="1.5"/><rect x="5" y="16" width="12" height="2" rx=".5" fill="white"/><rect x="6" y="6" width="10" height="2" rx=".5" fill="white"/><rect x="7.5" y="8" width="1.5" height="8" rx=".5" fill="white"/><rect x="10.25" y="8" width="1.5" height="8" rx=".5" fill="white"/><rect x="13" y="8" width="1.5" height="8" rx=".5" fill="white"/><polygon points="6,6 11,3 16,6" fill="white" opacity=".9"/></svg>
          Monumentos Históricos
        </div>
        <button class="mon-close" id="mon-close">✕</button>
      </div>
      <div class="mon-filters" id="mon-filters">
        <span class="mon-filter active" data-cat="all">Todos</span>
      </div>
      <div class="mon-counter" id="mon-counter" style="display:none">
        <span id="mon-count-txt"></span>
        <span id="mon-query-txt" style="color:var(--amber);font-weight:600;font-size:10px;"></span>
      </div>
      <div class="mon-results" id="mon-results">
        <div class="mon-msg">Escribe para buscar…</div>
      </div>
    </div>

    <button class="clear-routes-btn" id="clear-btn" onclick="clearRoutes()">✕ Limpiar trayectorias</button>

    <div class="bmpanel">
      <button class="bmbtn on" id="bm-light" onclick="setBM('light')">Claro</button>
      <button class="bmbtn"    id="bm-osm"   onclick="setBM('osm')">OSM</button>
      <button class="bmbtn"    id="bm-dark"  onclick="setBM('dark')">Oscuro</button>
      <button class="bmbtn"    id="bm-sat"   onclick="setBM('sat')">Satélite</button>
    </div>
    <div class="coordsbar">
      <span>LAT <span class="cval" id="clat">—</span></span>
      <span>LNG <span class="cval" id="clng">—</span></span>
      <span>ZOOM <span class="cval" id="czoom">—</span></span>
    </div>
  </div>
</div>
<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="geoportal.js"></script>
</body>
</html>
